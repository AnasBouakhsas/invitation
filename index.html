<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invitation pour dejeuner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --black: #111111;
      --gray: #666666;
      --light: #f5f5f5;
      --border: #e0e0e0;
      --red: #d0281e;
    }

    body {
      background-color: var(--light);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      max-width: 450px;
      width: 100%;
      padding: 3rem 2.5rem;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-accent {
      width: 100%;
      height: 3px;
      background: var(--black);
      margin-bottom: 2.5rem;
      position: relative;
    }

    .top-accent::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 40px;
      height: 3px;
      background: var(--red);
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 0.8rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.6rem;
      color: var(--black);
    }

    h1 em {
      font-style: italic;
      color: var(--red);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--gray);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .field { margin-bottom: 1.6rem; }

    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 0.6rem;
    }

    .field label .req { color: var(--red); margin-left: 2px; }

    .field input[type="text"],
    .field input[type="date"] {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 0.55rem 0;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--black);
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder { color: #bbb; }
    .field input:focus { border-bottom-color: var(--black); }

    .btn-jsp {
      margin-top: 0.7rem;
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      border: 1px solid var(--border);
      background: white;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-jsp:hover { border-color: var(--black); color: var(--black); }
    .btn-jsp.active { background: var(--black); border-color: var(--black); color: white; }

    .error {
      font-size: 0.73rem;
      color: var(--red);
      margin-top: 0.4rem;
      display: none;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-top: 2rem;
    }

    .btn-oui {
      background: var(--black);
      color: white;
      border: none;
      padding: 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-oui::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      width: 100%; height: 2px;
      background: var(--red);
    }
    .btn-oui:hover { background: #222; }

    .btn-peut {
      background: white;
      color: var(--black);
      border: 1px solid var(--black);
      padding: 0.85rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-peut:hover { background: var(--black); color: white; }

    .btn-non {
      background: transparent;
      border: none;
      color: #aaa;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0.3rem;
      text-align: center;
      transition: color 0.2s;
    }
    .btn-non:hover { color: var(--gray); }

    .merci {
      display: none;
      text-align: center;
      padding: 2rem 0;
      animation: fadeUp 0.6s ease both;
    }

    .merci-accent {
      width: 40px;
      height: 3px;
      background: var(--red);
      margin: 0 auto 2rem;
    }

    .merci h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
      color: var(--black);
    }

    .merci p {
      font-size: 0.85rem;
      color: var(--gray);
      line-height: 1.8;
      font-weight: 300;
    }

    .form-body { transition: opacity 0.35s; }
  </style>
</head>
<body>
<div class="card">

  <div class="form-body" id="formBody">
    <div class="top-accent"></div>
    <p class="eyebrow">Invitation pour dejeuner</p>
    <h1>Dejeuner a <em>deux ?</em></h1>
    <p class="subtitle">J'aimerais t'inviter.<br>Mais 9bel, khassek tjawbi 3la had les questions </p>

    <hr />

    <form id="inviteForm" action="https://formspree.io/f/mkokqaql" method="POST">



      <div class="field">
        <label>Fine tebghi nemchiw ?</label>
        <input type="text" id="lieu" name="lieu" placeholder="khtary chi blassa !" />
        <div style="margin-top: 0.6rem;">
          <button type="button" class="btn-jsp" id="btnJsp" onclick="toggleJsp()">Ma3reftch &#x1F937;&#x200D;&#x2640;&#xFE0F; ,khtar nta !</button>
        </div>
        <label>ina nhar ? <span class="req">*</span></label>
        <input type="date" id="date" name="date" />
        <div class="error" id="dateError">Darori tkhtari une date.</div>
      </div>

      <input type="hidden" id="reponse" name="reponse" />

      <hr />

      <div class="actions">
        <button type="button" class="btn-oui" onclick="envoyer('Oui')">Confirmer</button>
        <button type="button" class="btn-peut" onclick="envoyer('Peut-etre')">Ma3reftch &#x1F937;&#x200D;&#x2640;&#xFE0F;</button>
        <button type="button" class="btn-non" onclick="envoyer('Pas interessee')">Mabghitch daba ou Peut-être une autre fois </button>
      </div>

    </form>
  </div>

  <div class="merci" id="merciSection">
    <div class="merci-accent"></div>
    <h2 id="merciTitre">Merci.</h2>
    <p id="merciTexte">Ta reponse a bien ete recue.<br>A tres bientot.</p>
  </div>

</div>

<script>
  document.getElementById('date').min = new Date().toISOString().split('T')[0];

  function toggleJsp() {
    var btn = document.getElementById('btnJsp');
    var input = document.getElementById('lieu');
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      input.value = '';
      input.disabled = false;
    } else {
      btn.classList.add('active');
      input.value = 'Je ne sais pas';
      input.disabled = true;
    }
  }

  function envoyer(rep) {
    var date = document.getElementById('date').value;
    var erreur = document.getElementById('dateError');
    if (!date) {
      erreur.style.display = 'block';
      document.getElementById('date').focus();
      return;
    }
    erreur.style.display = 'none';
    document.getElementById('reponse').value = rep;
    var form = document.getElementById('inviteForm');
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).finally(function() { afficherMerci(rep); });
  }

  function afficherMerci(rep) {
    var body = document.getElementById('formBody');
    body.style.opacity = '0';
    setTimeout(function() {
      body.style.display = 'none';
      var titre = document.getElementById('merciTitre');
      var texte = document.getElementById('merciTexte');
      if (rep === 'Oui') {
        titre.textContent = 'Super.';
        texte.innerHTML = 'Je suis ravi de ta reponse.<br>On se retrouve tres bientot.';
      } else if (rep === 'Peut-etre') {
        titre.textContent = "D'accord.";
        texte.innerHTML = 'Pas de pression.<br>On en reparlera bientot.';
      } else {
        titre.textContent = 'Compris.';
        texte.innerHTML = 'Merci pour ta reponse.';
      }
      document.getElementById('merciSection').style.display = 'block';
    }, 350);
  }
</script>
</body>
</html>
